version: '3.8'

services:
  quote-app-1:
    build: .
    container_name: quote-app-1
    ports:
      - "5000:5000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  quote-app-2:
    build: .
    container_name: quote-app-2
    ports:
      - "5001:5000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
